name: Build and Push Container Image

on:
  push:
    branches: [main]

permissions:
  contents: write
  packages: write

env:
  IMAGE: ghcr.io/34rthy/sakchote-portfolio

jobs:
  build:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          provenance: false
          build-args: |
            BUILD_SHA=${{ github.sha }}
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}

      - name: Update k8s manifest with new image tag
        run: |
          sed -i "s|image: ${{ env.IMAGE }}:.*|image: ${{ env.IMAGE }}:${{ github.sha }}|" k8s/portfolio.yaml

      - name: Commit and push manifest update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/portfolio.yaml
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: update image tag to ${GITHUB_SHA::7} [skip ci]"
          git push
